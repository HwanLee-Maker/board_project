<!DOCTYPE html>
<html>
<head>
    <title>Board</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background:#f5f6f8; }
        .post-card {
            background:white;
            border-radius:12px;
            padding:15px;
            margin-bottom:15px;
            box-shadow:0 2px 8px rgba(0,0,0,0.05);
        }
        .write-box {
            background:white;
            padding:15px;
            border-radius:12px;
            margin-bottom:20px;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <!-- 상단 -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>📢 SNS 게시판</h4>
        <a href="/logout" class="btn btn-danger btn-sm">로그아웃</a>
    </div>

    <p>👤 {{ user }} 님 환영합니다</p>

    <!-- 글 작성 (AJAX) -->
    <div class="write-box">
        <input id="title" class="form-control mb-2" placeholder="제목">
        <textarea id="content" class="form-control mb-2" placeholder="내용"></textarea>
        <button onclick="submitPost()" class="btn btn-primary w-100">게시</button>
    </div>

    <!-- 게시글 -->
    <div id="postList">

        {% for p in posts %}
        <div class="post-card">
            <b>{{ p.title }}</b>
            <p>{{ p.content }}</p>

            <small class="text-muted">
                {{ p.writer }} | {{ p.created_at }}
            </small>

            <div class="mt-2">
                <a href="/edit/{{ p.idx }}" class="btn btn-warning btn-sm">수정</a>
                <a href="/delete/{{ p.idx }}" class="btn btn-danger btn-sm">삭제</a>
            </div>
        </div>
        {% endfor %}

    </div>

</div>

<!-- AJAX JS -->
<script>
function submitPost() {
    let title = document.getElementById("title").value;
    let content = document.getElementById("content").value;

    fetch("/api/post", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({title, content})
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success") {
            location.reload(); // 간단 리로드 (안정형)
        }
    });
}
</script>

</body>
</html>
